<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Faltas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topo">
      <h1>Controle de Faltas</h1>
      <p class="sub">Painel de faltas com visual escuro para embed no Notion.</p>
    </header>

    <section class="painel-config">
      <div class="campo">
        <label for="supabaseUrl">Supabase URL</label>
        <input id="supabaseUrl" type="text" placeholder="https://SEU-PROJETO.supabase.co" />
      </div>

      <div class="campo">
        <label for="supabaseKey">Supabase anon key</label>
        <input id="supabaseKey" type="text" placeholder="Cole sua anon public key" />
      </div>

      <div class="config-row">
        <button id="salvarBtn">Salvar configuração</button>
        <button id="carregarBtn">Carregar</button>
      </div>

      <p id="status" class="status"></p>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
